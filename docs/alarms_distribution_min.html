<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="icon" href="logo.png">
    <title>התפלגות אזעקות - ציר זמן</title>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- PapaParse -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;800&family=Outfit:wght@300;400;600;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: rgba(30, 41, 59, 0.7);
            --accent-color: #38bdf8;
            --text-color: #f8fafc;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Assistant', 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            justify-content: center;
            overflow: hidden;
        }

        .page-container {
            width: 100%;
            max-width: 1200px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: rgba(15, 23, 42, 0.5);
            border-left: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
        }

        @media (max-width: 900px) {
            body {
                overflow-y: auto;
                height: auto;
                min-height: 100vh;
            }

            .page-container {
                height: auto;
                min-height: 100vh;
            }
        }

        /* Header */
        header {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-color);
            z-index: 100;
        }

        .logo-section h1 {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 13px;
            color: #94a3b8;
            margin-top: 4px;
        }

        .subtitle a {
            color: var(--accent-color);
            text-decoration: none;
        }

        /* Layout */
        main {
            flex: 1;
            display: flex;
            padding: 20px;
            gap: 20px;
            overflow: hidden;
        }

        #filter-panel {
            width: 320px;
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            /* Allow suggestions to pop out */
            overflow: visible;
            position: relative;
            z-index: 100;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        /* Mobile Filter Toggle Button */
        #filter-toggle {
            display: none;
            position: fixed;
            top: 20px;
            left: 20px;
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            color: var(--accent-color);
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            z-index: 2000;
            cursor: pointer;
            justify-content: center;
            align-items: center;
        }

        #filter-toggle.active {
            background: #f8fafc;
        }

        .filter-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .filter-title {
            font-size: 16px;
            font-weight: 600;
            color: #cbd5e1;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Radio Styling */
        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .radio-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid transparent;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
        }

        .radio-item:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .radio-item input {
            accent-color: var(--accent-color);
            width: 16px;
            height: 16px;
        }

        .radio-item.active {
            background: rgba(56, 189, 248, 0.1);
            border-color: rgba(56, 189, 248, 0.3);
            color: var(--accent-color);
        }

        /* Dropdown Styling */
        select {
            background: #1e293b;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 12px;
            border-radius: 12px;
            font-family: inherit;
            cursor: pointer;
            outline: none;
            width: 100%;
        }

        select option {
            background: #1e293b;
            color: var(--text-color);
        }

        /* Searchable Dropdown Styling */
        .search-container {
            position: relative;
            width: 100%;
        }

        #location-search {
            width: 100%;
            background: #1e293b;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 12px;
            border-radius: 12px;
            font-family: inherit;
            outline: none;
            cursor: text;
        }

        #location-dropdown {
            position: absolute;
            top: calc(100% + 5px);
            left: 0;
            right: 0;
            background: #1e293b;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            max-height: 250px;
            overflow-y: auto;
            z-index: 5000;
            display: none;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .dropdown-item {
            padding: 10px 14px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .dropdown-item:hover {
            background: rgba(56, 189, 248, 0.1);
            color: var(--accent-color);
        }

        .dropdown-item.selected {
            background: rgba(56, 189, 248, 0.2);
            font-weight: 600;
            color: var(--accent-color);
        }

        .apply-button {
            margin-top: 12px;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-family: inherit;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.2);
        }

        .apply-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.3);
        }

        .apply-button:active {
            transform: translateY(0);
        }

        /* Vertical Stats Sidebar */
        #stats-sidebar {
            width: 160px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            padding: 16px 12px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 6px;
            text-align: center;
        }

        .stat-label {
            font-size: 11px;
            color: #94a3b8;
            font-weight: 600;
        }

        .stat-value {
            font-size: 18px;
            font-weight: 800;
            color: var(--accent-color);
        }

        #view-toggle-container {
            display: none;
        }

        .btn-toggle {
            display: flex;
            background: rgba(255, 255, 255, 0.05);
            padding: 4px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .toggle-option {
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .toggle-option.active {
            background: var(--accent-color);
            color: #0f172a;
        }

        .chart-container {
            flex: 1;
            position: relative;
            min-height: 0;
            /* Important for Chart.js in flexbox */
        }

        /* Two-chart layout */
        #charts-column {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
            min-height: 0;
            min-width: 0;
        }

        #main-content {
            flex: 1;
            display: flex;
            gap: 20px;
            min-height: 0;
        }

        .chart-section {
            flex: 1;
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            position: relative;
            min-width: 0;
            min-height: 0;
        }

        .chart-section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .chart-section-title {
            font-size: 14px;
            font-weight: 600;
            color: #94a3b8;
        }

        @media (max-width: 900px) {
            main {
                flex-direction: column;
                overflow-y: visible;
                /* Extra padding so last elements clear Samsung virtual nav buttons */
                padding-bottom: env(safe-area-inset-bottom, 0px);
                margin-bottom: 120px;
            }

            #filter-panel {
                position: fixed;
                top: 0;
                left: 0;
                bottom: 0;
                right: auto;
                width: 320px;
                height: 100vh;
                margin: 0;
                border-radius: 0;
                transform: translateX(-100%);
                opacity: 0;
                pointer-events: none;
                box-shadow: 10px 0 30px rgba(0, 0, 0, 0.5);
            }

            #filter-panel.open {
                transform: translateX(0);
                opacity: 1;
                pointer-events: auto;
            }

            #filter-toggle {
                display: flex;
            }

            #main-content {
                flex-direction: column;
                flex-shrink: 0;
            }

            #stats-sidebar {
                width: 100%;
                flex-direction: row;
                flex-wrap: wrap;
            }

            .stat-card {
                flex: 1;
                min-width: 100px;
            }
        }
    </style>
</head>

<body>

    <div class="page-container">

        <header>
            <div class="logo-section">
                <h1 id="main-title">התפלגות אזעקות</h1>
                <div class="subtitle">
                    הוכן על ידי <a href="https://oct7database.com" target="_blank">oct7database.com</a> · נתוני פיקוד
                    העורף
                    דרך <a href="https://www.tzevaadom.co.il/historical" target="_blank">צופר</a>
                </div>
            </div>
        </header>

        <main>
            <div id="filter-panel">
                <!-- Time Selection -->
                <div class="filter-section">
                    <div class="filter-title">📅 טווח זמן</div>
                    <select id="campaign-select">
                        <!-- Campaigns injected here -->
                    </select>
                </div>

                <!-- Threat Type Selection (Dropdown) -->
                <div class="filter-section">
                    <div class="filter-title">🚀 סוג איום</div>
                    <select id="threat-select">
                        <option value="0" selected>>רקטות\טילים</option>
                        <option value="5">כלי טיס עויין</option>
                    </select>
                </div>

                <!-- Origin Selection (Dropdown) -->
                <div class="filter-section">
                    <div class="filter-title">🚩 מקור</div>
                    <select id="origin-select">
                        <!-- Origins injected here -->
                    </select>
                </div>

                <!-- Location Selection (Searchable) -->
                <div class="filter-section">
                    <div class="filter-title">📍 מיקום</div>
                    <div class="search-container">
                        <input type="text" id="location-search" placeholder="חפש יישוב..." autocomplete="off">
                        <div id="location-dropdown">
                            <!-- Items injected here -->
                        </div>
                    </div>
                </div>
                <button id="btn-apply" class="apply-button">החל סינון</button>
            </div>

            <div id="main-content">
                <div id="charts-column">
                    <!-- 24-Hour Distribution Chart -->
                    <div class="chart-section">
                        <div class="chart-section-header">
                            <div class="chart-section-title">התפלגות לפי שעה (24 שעות)</div>
                            <div class="btn-toggle">
                                <div class="toggle-option" id="view-bar">גרף עמודות</div>
                                <div class="toggle-option active" id="view-clock">שעון 24ש</div>
                            </div>
                        </div>
                        <div class="chart-container">
                            <canvas id="mainChart"></canvas>
                        </div>
                    </div>

                    <!-- Within-the-Hour Distribution Chart -->
                    <div class="chart-section">
                        <div class="chart-section-header">
                            <div class="chart-section-title">התפלגות בתוך השעה (דקות)</div>
                            <div class="btn-toggle">
                                <div class="toggle-option" id="view-min-bar">גרף עמודות</div>
                                <div class="toggle-option active" id="view-min-clock">שעון 60 דקות</div>
                            </div>
                        </div>
                        <div class="chart-container">
                            <canvas id="minuteChart"></canvas>
                        </div>
                    </div>
                </div>

                <div id="stats-sidebar">
                    <div class="stat-card">
                        <div class="stat-label">סה"כ אזעקות</div>
                        <div class="stat-value" id="stat-total">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">שעת שיא</div>
                        <div class="stat-value" id="stat-peak">-</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">דקת שיא</div>
                        <div class="stat-value" id="stat-peak-min">-</div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <button id="filter-toggle" title="סינון">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon>
        </svg>
    </button>

    <script>
        const GITHUB_RAW = 'https://raw.githubusercontent.com/yuval-harpaz/alarms/refs/heads/master/';

        const campaigns = [
            { name: '24 שעות אחרונות', start: 'last24h', end: null },
            { name: 'שאגת הארי', start: '2026-02-28', end: null },
            { name: 'עם כלביא', start: '2025-06-13', end: '2025-06-24' },
            { name: 'חיצי הצפון', start: '2024-09-19', end: '2024-11-27' },
            { name: 'מגן ברזל', start: '2024-04-13', end: '2024-04-14' },
            { name: 'חרבות ברזל', start: '2023-10-07', end: null },
            { name: '7 באוקטובר', start: '2023-10-07', end: '2023-10-07' },
            { name: 'מגן וחץ', start: '2023-05-09', end: '2023-05-13' },
            { name: 'עלות השחר', start: '2022-08-05', end: '2022-08-08' },
            { name: 'שומר החומות', start: '2021-05-10', end: '2021-05-21' },
            { name: 'חגורה שחורה', start: '2019-11-12', end: '2019-11-14' },
        ];

        let DATE_FROM = campaigns[1].start;
        let DATE_TO = null;
        let currentAlarms = [];
        let mainChart = null;
        let minuteChart = null;
        let currentView = 'clock'; // 'bar' or 'clock'
        let currentMinView = 'clock'; // 'bar' or 'clock'
        let cachedChartData = Array(24).fill(0);
        let cachedMinuteData = Array(60).fill(0);

        // Robust Time Parsing
        function parseDate(str) {
            if (!str) return null;
            const iso = str.replace(' ', 'T');
            if (iso.includes('+') || iso.includes('Z')) return new Date(iso);
            return new Date(iso + "+02:00"); // Force Israel Time (+02:00)
        }

        async function fetchCSV(f) {
            const r = await fetch(GITHUB_RAW + f);
            const text = await r.text();
            return new Promise(res => Papa.parse(text, { header: true, dynamicTyping: true, complete: d => res(d.data) }));
        }

        function initUI() {
            // Campaigns Dropdown
            const select = document.getElementById('campaign-select');
            campaigns.forEach((camp, i) => {
                const opt = document.createElement('option');
                opt.value = i;
                opt.textContent = camp.name;
                if (camp.start === '2026-02-28') opt.selected = true;
                select.appendChild(opt);
            });

            select.onchange = () => {
                const camp = campaigns[select.value];
                DATE_FROM = camp.start;
                DATE_TO = camp.end;
            };

            // Threat Type Dropdown
            // Value read directly in updateDisplay()

            // Location Dropdown Logic
            const searchInput = document.getElementById('location-search');
            const dropdown = document.getElementById('location-dropdown');

            searchInput.onfocus = () => {
                dropdown.style.display = 'block';
                filterLocations(searchInput.value);
                searchInput.select();
            };

            searchInput.oninput = (e) => {
                filterLocations(e.target.value);
            };

            document.addEventListener('click', (e) => {
                if (!e.target.closest('.search-container')) {
                    dropdown.style.display = 'none';
                }
            });

            // Origin Dropdown
            // Value read directly in updateDisplay()

            document.getElementById('btn-apply').onclick = applyFilters;

            // View Toggle (24h chart)
            document.getElementById('view-bar').onclick = () => switchView('bar');
            document.getElementById('view-clock').onclick = () => switchView('clock');

            // View Toggle (minute chart)
            document.getElementById('view-min-bar').onclick = () => switchMinView('bar');
            document.getElementById('view-min-clock').onclick = () => switchMinView('clock');

            // Mobile Filter Toggle
            const filterToggle = document.getElementById('filter-toggle');
            const filterPanel = document.getElementById('filter-panel');
            const filterIcon = `
                <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon>
                </svg>`;
            const closeIcon = `
                <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>`;

            filterToggle.onclick = () => {
                const isOpen = filterPanel.classList.toggle('open');
                filterToggle.classList.toggle('active');
                filterToggle.innerHTML = isOpen ? closeIcon : filterIcon;
            };

            // Close filter on location select (mobile)
            // Modified below in selected.onclick
        }

        function applyFilters() {
            updateDisplay();
            if (window.innerWidth <= 900) {
                const filterPanel = document.getElementById('filter-panel');
                const filterToggle = document.getElementById('filter-toggle');
                const filterIcon = `
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon>
                    </svg>`;
                filterPanel.classList.remove('open');
                filterToggle.classList.remove('active');
                filterToggle.innerHTML = filterIcon;
            }
        }

        function switchView(view) {
            currentView = view;
            document.querySelectorAll('#view-bar, #view-clock').forEach(opt => opt.classList.remove('active'));
            document.getElementById('view-' + view).classList.add('active');
            renderChart(cachedChartData);
        }

        function switchMinView(view) {
            currentMinView = view;
            document.querySelectorAll('#view-min-bar, #view-min-clock').forEach(opt => opt.classList.remove('active'));
            document.getElementById('view-min-' + view).classList.add('active');
            renderMinuteChart(cachedMinuteData);
        }

        async function loadData() {
            currentAlarms = await fetchCSV('data/alarms.csv');
            initOrigins();
            initLocations();
            updateDisplay();
        }

        function initOrigins() {
            const origins = new Set();
            currentAlarms.forEach(a => {
                const o = (a.origin && String(a.origin).trim()) || '';
                // Exclude Israel and FA
                if (o && o !== 'Israel' && o !== 'FA') {
                    origins.add(o);
                }
            });

            const select = document.getElementById('origin-select');
            const translations = {
                'Iraq': 'עיראק', 'Yemen': 'תימן', 'Lebanon': 'לבנון',
                'Gaza': 'עזה', 'Iran': 'איראן', 'Syria': 'סוריה', 'בבירור': 'בבירור'
            };

            const sorted = [...origins].sort((a, b) => a.localeCompare(b, 'he'));

            sorted.forEach(o => {
                const opt = document.createElement('option');
                opt.value = o;
                opt.textContent = translations[o] || o;
                if (o === 'Iran') opt.selected = true;
                select.appendChild(opt);
            });
        }

        let ALL_LOCATIONS = [];
        let SELECTED_LOCATION = 'all';

        function initLocations() {
            const cities = new Set();
            currentAlarms.forEach(a => {
                if (a.cities) cities.add(a.cities);
            });
            ALL_LOCATIONS = ['הכל', ...[...cities].sort((a, b) => a.localeCompare(b, 'he'))];
            renderLocationDropdown(ALL_LOCATIONS);
            document.getElementById('location-search').value = 'הכל';
        }

        function renderLocationDropdown(list) {
            const dropdown = document.getElementById('location-dropdown');
            dropdown.innerHTML = '';
            list.forEach(loc => {
                const item = document.createElement('div');
                item.className = 'dropdown-item';
                if (loc === (SELECTED_LOCATION === 'all' ? 'הכל' : SELECTED_LOCATION)) {
                    item.classList.add('selected');
                }
                item.textContent = loc;
                item.onclick = () => {
                    SELECTED_LOCATION = loc === 'הכל' ? 'all' : loc;
                    document.getElementById('location-search').value = loc;
                    document.getElementById('location-dropdown').style.display = 'none';
                };
                dropdown.appendChild(item);
            });
        }

        function filterLocations(query) {
            if (!query || query === 'הכל') {
                renderLocationDropdown(ALL_LOCATIONS);
                return;
            }
            const filtered = ALL_LOCATIONS.filter(loc => loc.includes(query));
            renderLocationDropdown(filtered);
        }

        function updateDisplay() {
            const selectedThreat = document.getElementById('threat-select').value;
            const selectedOrigin = document.getElementById('origin-select').value;
            const selectedLocation = SELECTED_LOCATION;

            const now = new Date();

            // 1. Total Count Filter (Matches Time, Threat, Location - includes ALL origins)
            const totalMatchingSet = currentAlarms.filter(a => {
                const d = parseDate(a.time);
                if (!d || isNaN(d)) return false;

                // Time Filter
                if (DATE_FROM === 'last24h') {
                    if ((now - d) > 24 * 60 * 60 * 1000) return false;
                } else {
                    const ds = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
                    if (ds < DATE_FROM || ds > (DATE_TO || '9999-12-31')) return false;
                }

                // Threat Filter
                if (a.threat != selectedThreat) return false;

                // Location Filter
                if (selectedLocation !== 'all' && a.cities !== selectedLocation) return false;

                return true;
            });

            // 2. Chart Filter (Matches Total + specific Origin)
            const filteredForChart = totalMatchingSet.filter(a => {
                const origin = (a.origin && String(a.origin).trim()) || '';
                return origin === selectedOrigin;
            });

            // Aggregate by Hour for Chart
            const hourCounts = Array(24).fill(0);
            filteredForChart.forEach(a => {
                const d = parseDate(a.time);
                const hour = parseInt(new Intl.DateTimeFormat('he-IL', { timeZone: 'Asia/Jerusalem', hour: '2-digit', hour12: false }).format(d));
                hourCounts[hour]++;
            });
            cachedChartData = hourCounts;

            // Aggregate by Minute within the hour
            const minuteCounts = Array(60).fill(0);
            filteredForChart.forEach(a => {
                const d = parseDate(a.time);
                if (!d || isNaN(d)) return;
                const minute = parseInt(new Intl.DateTimeFormat('he-IL', { timeZone: 'Asia/Jerusalem', minute: '2-digit' }).format(d));
                if (minute >= 0 && minute < 60) minuteCounts[minute]++;
            });
            cachedMinuteData = minuteCounts;

            // Update Stats
            document.getElementById('stat-total').textContent = totalMatchingSet.length.toLocaleString();

            const peakHour = hourCounts.indexOf(Math.max(...hourCounts));
            document.getElementById('stat-peak').textContent = filteredForChart.length > 0 ? `${peakHour}:00` : '-';

            const peakMinute = minuteCounts.indexOf(Math.max(...minuteCounts));
            document.getElementById('stat-peak-min').textContent = filteredForChart.length > 0 ? `דקה ${peakMinute}` : '-';

            renderChart(hourCounts);
            renderMinuteChart(minuteCounts);
        }

        function renderChart(data) {
            const ctx = document.getElementById('mainChart').getContext('2d');
            const labels = Array.from({ length: 24 }, (_, i) => `${i}:00`);

            if (mainChart) mainChart.destroy();

            const chartConfig = {
                type: currentView === 'bar' ? 'bar' : 'polarArea',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'מספר אזעקות',
                        data: data || Array(24).fill(0),
                        backgroundColor: 'rgba(56, 189, 248, 0.6)',
                        borderColor: '#38bdf8',
                        borderWidth: 2,
                        borderRadius: currentView === 'bar' ? 6 : 0,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: (context) => `אזעקות: ${context.raw}`
                            }
                        }
                    },
                    scales: currentView === 'bar' ? {
                        y: {
                            beginAtZero: true,
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            ticks: { color: '#94a3b8' }
                        },
                        x: {
                            grid: { display: false },
                            ticks: { color: '#94a3b8' }
                        }
                    } : {
                        r: {
                            grid: { color: 'rgba(255,255,255,0.1)' },
                            angleLines: { color: 'rgba(255,255,255,0.1)' },
                            pointLabels: { display: true, color: '#94a3b8' },
                            ticks: { display: false }
                        }
                    }
                }
            };

            mainChart = new Chart(ctx, chartConfig);
        }

        function renderMinuteChart(data) {
            const ctx = document.getElementById('minuteChart').getContext('2d');
            const labels = Array.from({ length: 60 }, (_, i) => i % 5 === 0 ? `:${String(i).padStart(2, '0')}` : '');

            if (minuteChart) minuteChart.destroy();

            const chartConfig = {
                type: currentMinView === 'bar' ? 'bar' : 'polarArea',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'מספר אזעקות',
                        data: data || Array(60).fill(0),
                        backgroundColor: 'rgba(129, 140, 248, 0.6)',
                        borderColor: '#818cf8',
                        borderWidth: currentMinView === 'bar' ? 2 : 1,
                        borderRadius: currentMinView === 'bar' ? 4 : 0,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                title: (items) => `דקה :${String(items[0].dataIndex).padStart(2, '0')}`,
                                label: (context) => `אזעקות: ${context.raw}`
                            }
                        }
                    },
                    scales: currentMinView === 'bar' ? {
                        y: {
                            beginAtZero: true,
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            ticks: { color: '#94a3b8' }
                        },
                        x: {
                            grid: { display: false },
                            ticks: {
                                color: '#94a3b8',
                                maxRotation: 0,
                                callback: function (val, idx) {
                                    return idx % 5 === 0 ? `:${String(idx).padStart(2, '0')}` : '';
                                }
                            }
                        }
                    } : {
                        r: {
                            grid: { color: 'rgba(255,255,255,0.1)' },
                            angleLines: { color: 'rgba(255,255,255,0.1)' },
                            pointLabels: {
                                display: true,
                                color: '#94a3b8',
                                font: { size: 9 },
                                callback: (label, idx) => idx % 5 === 0 ? label : ''
                            },
                            ticks: { display: false }
                        }
                    }
                }
            };

            minuteChart = new Chart(ctx, chartConfig);
        }

        initUI();
        loadData();
    </script>
</body>

</html>
